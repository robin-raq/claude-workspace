name: CI

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [22, 24]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: Install system dependencies (tmux for integration tests, shellcheck for scripts)
        run: sudo apt-get update && sudo apt-get install -y tmux shellcheck
      - run: npm ci
      - run: npm run check
      - name: ShellCheck
        run: |
          if compgen -G 'scripts/*.sh' > /dev/null; then
            shellcheck scripts/*.sh
          else
            echo 'no shell scripts yet'
          fi
